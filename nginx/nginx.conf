worker_processes auto;

events {
    worker_connections 1024;
}

http {
    # --- Load balancing pool -------------------------------------------
    # `least_conn` routes the next request to whichever upstream currently
    # has the fewest open connections, rather than plain round-robin. For a
    # service where request cost is uneven (fast 202-Accepted POSTs mixed
    # with GET status polls), this avoids piling work onto an instance that's
    # still busy while a sibling instance sits idle.
    #
    # Each entry is a Docker Compose service name — Docker's embedded DNS
    # resolves `app1`/`app2`/`app3` to the container's virtual IP on the
    # shared `task-worker-net` network, so no hardcoded IPs are needed and
    # replicas can be added by editing docker-compose.yml + this list together.
    upstream task_worker_cluster {
        least_conn;
        server app1:5000 max_fails=3 fail_timeout=10s;
        server app2:5000 max_fails=3 fail_timeout=10s;
        server app3:5000 max_fails=3 fail_timeout=10s;
        keepalive 32;
    }

    # `limit_conn_zone` MUST be declared at the http{} level — it only defines
    # the shared-memory zone. The actual enforcement directive, `limit_conn`,
    # is applied per-server/location below. Declaring the zone inside server{}
    # is invalid syntax and fails Nginx startup with:
    #   "limit_conn_zone" directive is not allowed here
    limit_conn_zone $binary_remote_addr zone=perip:10m;

    log_format upstream_timing
        '$remote_addr - [$time_local] "$request" '
        'status=$status upstream=$upstream_addr '
        'upstream_response_time=$upstream_response_time request_time=$request_time';

    access_log /var/log/nginx/access.log upstream_timing;

    server {
        listen 80;
        server_name _;

        # Nginx-level connection ceiling as a coarse first line of defense —
        # deliberately looser than the application's own Redis token-bucket
        # limiter (10 req/s/IP), which remains the authoritative, IP-fair limit
        # enforced consistently no matter which upstream replica is hit.
        limit_conn perip 50;

        location / {
            proxy_pass http://task_worker_cluster;
            proxy_http_version 1.1;
            proxy_set_header Connection "";

            # CRITICAL: the app's token-bucket rate limiter keys off the
            # *first* X-Forwarded-For hop to identify the real client — without
            # this, every request would appear to originate from Nginx's own
            # container IP and all clients would share one bucket.
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_connect_timeout 5s;
            proxy_send_timeout 30s;
            proxy_read_timeout 30s;
        }

        # Nginx's own liveness probe — intentionally does NOT proxy to the
        # upstream cluster, so this endpoint stays cheap and answers even if
        # every app replica is momentarily unhealthy.
        location /nginx-health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }
    }
}
